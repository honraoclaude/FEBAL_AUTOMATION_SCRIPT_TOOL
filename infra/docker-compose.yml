# Platform core stack — Phase 1 (plan 01-01).
#
# Canonical invocation (from the REPO ROOT — the single mechanism for env interpolation):
#   docker compose -f infra/docker-compose.yml --env-file .env up -d --wait
# The repo-root .env is the one config source shared by compose and hybrid host mode (D-09);
# ${VAR} below interpolates from that --env-file. Do not add per-service env_file keys.
#
# api / web / saucedemo services are appended by plans 01-02 / 01-04 / 01-07.
# Dormant services (neo4j, rabbitmq, elasticsearch) carry `profiles:` so a plain
# `up` NEVER starts them (D-08); they activate in Phases 3 / 7 / 9-10.
#
# Memory limits use service-level mem_limit (unconditionally enforced in non-swarm
# compose) — NEVER deploy.resources.limits (PITFALLS Pitfall 3 / RESEARCH Pattern 1).

services:
  postgres:
    image: postgres:17-alpine
    mem_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432" # exposed for hybrid host mode (D-09)

  redis:
    image: redis:8-alpine
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379" # exposed for hybrid host mode (D-09)

  api:
    build: ../apps/api
    mem_limit: 1g
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      TARGET_CREDENTIAL_KEY: ${TARGET_CREDENTIAL_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      COOKIE_SECURE: "false"
      WATCHFILES_FORCE_POLLING: "true" # uvicorn --reload over a Windows bind mount needs polling
    volumes:
      - ../apps/api/app:/app/app # hot-reload mount
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8001:8000" # host 8001 (8000 held by another local project); container-internal 8000

  web:
    build: ../apps/web
    mem_limit: 1536m # next dev + Turbopack is memory-hungry
    environment:
      API_URL: http://api:8000 # compose-internal; hybrid host mode uses http://localhost:8001
      WATCHPACK_POLLING: "true" # webpack-fallback polling; Turbopack hot-reload NOT promised (Pitfall 1)
    volumes:
      - ../apps/web:/app # source mount (stack-up promise, not sub-second DX)
      - /app/node_modules # volume-mask: NEVER bind-mount node_modules on Windows
      - /app/.next
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok||(r.status>=300&&r.status<400)?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    ports:
      - "3000:3000"

  # --- Dormant: defined now, activated by later phases (D-08) ---
  neo4j:
    image: neo4j:2025
    profiles: [graph] # Phase 3/5
    mem_limit: 2g

  rabbitmq:
    image: rabbitmq:4-management
    profiles: [queue] # Phase 7
    mem_limit: 512m

  elasticsearch:
    image: elasticsearch:9.4.1
    profiles: [search] # Phase 9/10
    mem_limit: 1536m
    environment:
      ES_JAVA_OPTS: "-Xms512m -Xmx1g"
      discovery.type: single-node

volumes:
  pgdata:
