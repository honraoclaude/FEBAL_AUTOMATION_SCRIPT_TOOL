# Platform core stack — Phase 1 (plan 01-01).
#
# Canonical invocation (from the REPO ROOT — the single mechanism for env interpolation):
#   docker compose -f infra/docker-compose.yml --env-file .env up -d --wait
# The repo-root .env is the one config source shared by compose and hybrid host mode (D-09);
# ${VAR} below interpolates from that --env-file. Do not add per-service env_file keys.
#
# api / web / saucedemo services are appended by plans 01-02 / 01-04 / 01-07.
# Dormant services (neo4j, rabbitmq, elasticsearch) carry `profiles:` so a plain
# `up` NEVER starts them (D-08); they activate in Phases 3 / 7 / 9-10.
#
# Memory limits use service-level mem_limit (unconditionally enforced in non-swarm
# compose) — NEVER deploy.resources.limits (PITFALLS Pitfall 3 / RESEARCH Pattern 1).

services:
  postgres:
    image: postgres:17-alpine
    mem_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432" # exposed for hybrid host mode (D-09)

  redis:
    image: redis:8-alpine
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379" # exposed for hybrid host mode (D-09)

  api:
    build: ../apps/api
    mem_limit: 1g
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      TARGET_CREDENTIAL_KEY: ${TARGET_CREDENTIAL_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      COOKIE_SECURE: "false"
      # LLM gateway (Phase 2) — model is required; provider keys are optional
      # placeholders (empty in .env), never literal secrets in compose.
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      # Neo4j knowledge graph (Phase 3) — enumerated explicitly (compose does not
      # pass the whole .env; omitting these makes Settings() fail, 02-01 deviation #2).
      # In-cluster host is `neo4j` (Pitfall 6); the driver opens lazily, so the api
      # boots even when neo4j is down (graph profile inactive — no depends_on, A6).
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-please-change}
      # Artifact workspaces + execution runner (Phase 3, plan 03-04). The container WORKDIR
      # is /app (no apps/api ancestor), so the host's path-from-__file__ default would not
      # resolve; set both explicitly. WORKSPACES_DIR is a bind mount of the host repo-root
      # workspaces/ so generate-scripts (write) and /execute (discover/run) share one tree,
      # and host tests can plant a spec the container subprocess runs. EXECUTION_CWD is the
      # uv project root (pyproject.toml lives at /app) — the `uv run pytest` cwd.
      WORKSPACES_DIR: /app/workspaces
      EXECUTION_CWD: /app
      WATCHFILES_FORCE_POLLING: "true" # uvicorn --reload over a Windows bind mount needs polling
    volumes:
      - ../apps/api/app:/app/app # hot-reload mount
      # alembic dir bind-mounted so new migrations (e.g. 0004) are visible to the
      # self-migrating entrypoint without an image rebuild (03-02).
      - ../apps/api/alembic:/app/alembic
      # repo-root shared/ mounted at /app/shared so `import shared.events` resolves
      # identically to host tests (WORKDIR /app is on sys.path) — shared/ is outside
      # the build context, so it must be a mount, not a COPY (03-02 D-05).
      - ../shared:/app/shared
      # repo-root workspaces/ mounted at /app/workspaces (matches WORKSPACES_DIR) so the
      # spec generate-scripts WRITES is the spec /execute DISCOVERS + runs, and host
      # functional tests can plant a rendered spec the container subprocess executes (03-04).
      - ../workspaces:/app/workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8001:8000" # host 8001 (8000 held by another local project); container-internal 8000

  web:
    build: ../apps/web
    mem_limit: 1536m # next dev + Turbopack is memory-hungry
    environment:
      API_URL: http://api:8000 # compose-internal; hybrid host mode uses http://localhost:8001
      WATCHPACK_POLLING: "true" # webpack-fallback polling; Turbopack hot-reload NOT promised (Pitfall 1)
    volumes:
      - ../apps/web:/app # source mount (stack-up promise, not sub-second DX)
      - /app/node_modules # volume-mask: NEVER bind-mount node_modules on Windows
      - /app/.next
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok||(r.status>=300&&r.status<400)?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    ports:
      - "3000:3000"

  # Self-hosted demo target — QUAL-04 / D-10. Default profile (no `profiles:` key):
  # part of `docker compose up`. Own multi-stage build pinned to an upstream SHA
  # (infra/targets/saucedemo/Dockerfile). Tiny nginx static serve, mem_limit 128m.
  saucedemo:
    build: ./targets/saucedemo
    mem_limit: 128m
    healthcheck:
      # 127.0.0.1, not localhost: inside the container `localhost` resolves to
      # ::1 (IPv6) but nginx listens on IPv4 0.0.0.0:80, so a localhost probe
      # gets connection-refused. -O /dev/null avoids the --spider HEAD path.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "8080:80" # host 8080 verified free before adoption

  # --- Dormant: defined now, activated by later phases (D-08) ---
  # Trimmed to fit the 3GB WSL cap (D-01/02/03): heap 512m + pagecache 256m +
  # mem_limit 1g. Run ONLY via graph_mode (stops web's 1.5g first) so
  # postgres+redis+api+neo4j+saucedemo ≈ 2.9g stays under 3g (Pitfall 4).
  neo4j:
    image: neo4j:2025
    profiles: [graph] # Phase 3/5
    mem_limit: 1g
    environment:
      # auth as user/password; default flagged in .env.example, never a literal secret here.
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/please-change}
      # Pitfall 1: heap max is `server.memory.heap.max_size` → DOUBLE underscore on
      # `max__size` (the dot before `size` IS a literal underscore in the key); the
      # initial/heap keys use single underscores.
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      # `server.memory.pagecache.size` — single underscores throughout (no literal
      # underscore inside any segment), so NO doubling here.
      NEO4J_server_memory_pagecache_size: 256m
    healthcheck:
      # Mirrors the saucedemo wget shape; 7474 is the Neo4j HTTP browser/health port.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:7474/"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    ports:
      - "7687:7687" # Bolt (host-side neo4j_session fixture connects here)
      - "7474:7474" # HTTP browser / healthcheck

  rabbitmq:
    image: rabbitmq:4-management
    profiles: [queue] # Phase 7
    mem_limit: 512m

  elasticsearch:
    image: elasticsearch:9.4.1
    profiles: [search] # Phase 9/10
    mem_limit: 1536m
    environment:
      ES_JAVA_OPTS: "-Xms512m -Xmx1g"
      discovery.type: single-node

volumes:
  pgdata:
