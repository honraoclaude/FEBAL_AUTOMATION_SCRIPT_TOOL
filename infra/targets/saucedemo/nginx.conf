# SauceDemo static SPA server (QUAL-04 / D-10).
# try_files $uri /index.html is the SPA fallback (RESEARCH A5): client-side
# routing must survive direct/deep URL hits so the Phase 4 Explorer can navigate
# to arbitrary routes without hitting a 404.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}
