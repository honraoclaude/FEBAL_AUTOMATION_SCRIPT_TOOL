# RabbitMQ — Deployment + Service (INFRA-02).
# Translated from docker-compose.yml:331-345 (rabbitmq:4-management, mem_limit 512m,
# rabbitmq-diagnostics -q ping healthcheck). CORE in K8s (D-01 — not a queue profile).
# The Service exposes 5672 (AMQP), 15672 (management UI) AND 15692 (the built-in
# rabbitmq_prometheus plugin metrics — RESEARCH Pitfall 6: scrape 15692, NOT 5672).
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  labels:
    app: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
    - name: metrics # built-in rabbitmq_prometheus plugin — the scrape target (Pitfall 6)
      port: 15692
      targetPort: 15692
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:4-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
            - containerPort: 15692
          resources:
            requests:
              memory: "320Mi"
            limits:
              memory: "512Mi" # compose mem_limit 512m
          # Translate the compose rabbitmq-diagnostics -q ping healthcheck.
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
