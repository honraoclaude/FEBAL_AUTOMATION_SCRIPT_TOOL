# EXAMPLE Secret — PLACEHOLDER values only (T-11-10 / Security V14).
#
# This file is COMMITTED with example values so the manifest set renders and validates
# keylessly. For a REAL deploy, copy it to `secret.yaml`, replace every value with a
# real secret, and apply that file SEPARATELY (it is gitignored — see infra/k8s/README.md
# and the repo .gitignore note). NEVER bake real secrets into a committed manifest or an
# image.
#
# The env var NAMES are reused VERBATIM from apps/api/app/core/config.py (Settings reads
# JWT_SECRET, TARGET_CREDENTIAL_KEY, NEO4J_PASSWORD, etc.) so NO code rename is needed —
# the pods reference these keys via secretKeyRef.
#
# stringData (not data) so the values are human-readable plaintext placeholders, not
# base64 — Kubernetes base64-encodes stringData on apply.
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
type: Opaque
stringData:
  # Postgres superuser password (also used to build DATABASE_URL in the api/worker pods).
  POSTGRES_PASSWORD: "CHANGE_ME_postgres_password"
  # Backend-issued JWT signing secret (PLAT-05). Generate a strong random value.
  JWT_SECRET: "CHANGE_ME_jwt_signing_secret"
  # MultiFernet key(s) for target-credential encryption (comma-separated for rotation).
  # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  TARGET_CREDENTIAL_KEY: "CHANGE_ME_fernet_key_base64"
  # Neo4j auth in `user/password` form for the neo4j StatefulSet (NEO4J_AUTH env).
  NEO4J_AUTH: "neo4j/CHANGE_ME_neo4j_password"
  # Neo4j password ALONE for the api/worker driver (NEO4J_PASSWORD env) — must match the
  # password half of NEO4J_AUTH above.
  NEO4J_PASSWORD: "CHANGE_ME_neo4j_password"
  # Admin bootstrap password (seeded admin user on first boot).
  ADMIN_PASSWORD: "CHANGE_ME_admin_password"
  # Provider API keys — OPTIONAL (the platform boots without them; live autonomous
  # discovery needs one). Leave blank for keyless validation; set a real key to demo.
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
