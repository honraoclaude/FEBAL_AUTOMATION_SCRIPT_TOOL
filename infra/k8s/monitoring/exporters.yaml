# Metric exporters — postgres-exporter + redis-exporter (INFRA-02 / INFRA-04).
#
# The K8s analog of the compose `monitoring`-profile exporter sidecars. Only the two
# exporters the CLAUDE.md observability table calls for:
#   - postgres → quay.io/prometheuscommunity/postgres-exporter (:9187)  — the official upstream
#   - redis    → oliver006/redis_exporter                     (:9121)  — the official upstream
# NO RabbitMQ exporter (the built-in rabbitmq_prometheus plugin serves :15692 from the
# broker itself — RESEARCH Pitfall 6). NO Neo4j exporter (its Prometheus endpoint is
# Enterprise-only — CLAUDE.md; graph metrics come from the app-level collector, Plan 01).
# NO elasticsearch exporter here (it belongs with the ES overlay — search-tier optional).
#
# Both exporters connect to the in-cluster core Services (postgres / redis) by name, using
# the SAME credentials the api uses (the postgres exporter reads user/password from the
# platform Secret — never inline). Prometheus scrapes them by Service name (see prometheus.yaml).
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  labels:
    app: postgres-exporter
spec:
  selector:
    app: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter
          ports:
            - containerPort: 9187
          # Connect to the same Postgres the api uses (in-cluster Service `postgres`).
          # Host/port/db/user from the ConfigMap; the password from the Secret (T-11-10).
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_PASSWORD
            - name: DATA_SOURCE_URI
              value: "postgres:5432/$(POSTGRES_DB)?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: "$(POSTGRES_USER)"
            - name: DATA_SOURCE_PASS
              value: "$(POSTGRES_PASSWORD)"
          resources:
            requests:
              memory: "64Mi"
            limits:
              memory: "128Mi" # compose mem_limit 128m
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  labels:
    app: redis-exporter
spec:
  selector:
    app: redis-exporter
  ports:
    - name: metrics
      port: 9121
      targetPort: 9121
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter
          ports:
            - containerPort: 9121
          env:
            # In-cluster redis Service.
            - name: REDIS_ADDR
              value: "redis://redis:6379"
          resources:
            requests:
              memory: "64Mi"
            limits:
              memory: "128Mi" # compose mem_limit 128m
