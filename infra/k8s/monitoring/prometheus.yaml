# Prometheus — Deployment + Service + scrape-config ConfigMap (INFRA-02 / INFRA-04).
#
# The K8s analog of the compose `monitoring`-profile prometheus service. This is a
# SEPARATE manifest group (infra/k8s/monitoring), kept apart from the base so it is
# NOT deployed during the 3GB-constrained SC1 e2e (D-04 — off-by-default, like the
# compose profile). Enable it as a separate step: `kubectl apply -k infra/k8s/monitoring`.
#
# The scrape config below is the SAME as infra/monitoring/prometheus.yml (Plan 01) —
# in-cluster targets resolve by Service name (api / postgres-exporter / redis-exporter /
# rabbitmq / elasticsearch-exporter), which ARE the compose service names verbatim
# (RESEARCH Pitfall 6), so the config carries over unchanged. Neo4j has NO scrape job
# (Enterprise-only Prometheus endpoint — CLAUDE.md; graph metrics come from the app
# collector). The elasticsearch target only resolves when the ES overlay + an ES exporter
# are up; otherwise Prometheus surfaces up{job="elasticsearch"}==0 (honest, never fatal).
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    scrape_configs:
      - job_name: api
        metrics_path: /metrics
        static_configs:
          - targets: ['api:8000']

      - job_name: postgres
        static_configs:
          - targets: ['postgres-exporter:9187']

      - job_name: redis
        static_configs:
          - targets: ['redis-exporter:9121']

      - job_name: rabbitmq
        # The built-in rabbitmq_prometheus plugin on :15692 — NOT the AMQP 5672 port
        # and NOT an external exporter (RESEARCH Pitfall 6).
        static_configs:
          - targets: ['rabbitmq:15692']

      - job_name: elasticsearch
        # Only resolves when the ES overlay + an ES exporter are up; otherwise the
        # target is DOWN and Prometheus surfaces up{job="elasticsearch"}==0.
        static_configs:
          - targets: ['elasticsearch-exporter:9114']
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus
          ports:
            - containerPort: 9090
          # Mount the as-code scrape config at the default location (mirrors the compose
          # bind-mount at /etc/prometheus/prometheus.yml).
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
          resources:
            requests:
              memory: "320Mi"
            limits:
              memory: "512Mi" # compose mem_limit 512m
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: config
          configMap:
            name: prometheus-config
