# platform-ci — CI/CD for the platform images (INFRA-03 / D-02 / D-06, plan 11-02).
#
# SEPARATE from run-suite.yml (that workflow is the EXEC-02 same-engine tier trigger). This
# one gates a GHCR build-publish behind the keyless deterministic test lane + frontend checks.
#
# TWO JOBS (RESEARCH Pattern 4):
#   test          -> runs the keyless pytest marker lane + `tsc --noEmit` + eslint.
#   build-publish -> `needs: test`; builds + pushes the api & web images to GHCR
#                    (SHA + latest tags). The target test fixture is NEVER published (D-02).
#
# LEAST-PRIVILEGE TOKEN (T-11-05 / RESEARCH Security V14): the top-level permissions grant only
# `contents: read` + `packages: write` — the built-in GITHUB_TOKEN, NEVER a PAT. The token is
# passed to docker/login-action via `secrets.GITHUB_TOKEN` and is NEVER printed or echoed into
# the logs (T-11-06 / the run-suite.yml T-07-07 discipline) — login-action handles auth silently.
#
# SUPPLY CHAIN (T-11-07): SHA-tagged immutable refs + reproducible `uv sync --frozen` / `npm ci`
# builds; build-publish runs ONLY after the test gate passes (needs: test).

name: platform-ci

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    # The keyless lane runs `integration`-marked tests (NOT excluded by the marker set) that
    # connect to a real Postgres at localhost:5432 in their fixtures (apps/api/tests/conftest.py
    # _host_dsn + asyncpg.connect) — so a services:postgres container is REQUIRED (resolved Q2).
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: qa
          POSTGRES_PASSWORD: qa
          POSTGRES_DB: qa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qa -d qa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Deterministic CI values for the env conftest.py + app.core.config Settings() read at
      # import/collection time (Settings has no defaults for these — collection would crash
      # otherwise: CHECKER LOW-2). The lane is KEYLESS — no provider keys are set, so live_llm
      # tests stay skipped/excluded. DATABASE_URL points at the services:postgres container.
      DATABASE_URL: postgresql+asyncpg://qa:qa@localhost:5432/qa
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-deterministic-jwt-secret
      TARGET_CREDENTIAL_KEY: 6sJ7yq3v8mC0nF1aQ2wE4rT5yU6iO7pA8sD9fG0hJ1k=
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-admin-password
      LLM_DEFAULT_MODEL: anthropic:claude-3-5-haiku-latest
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ci-neo4j-password
    steps:
      - uses: actions/checkout@v5

      # --- Backend: keyless pytest lane against the services:postgres container ---
      - uses: astral-sh/setup-uv@v6
      - name: uv sync (frozen)
        run: uv sync --frozen
        working-directory: apps/api
      - name: alembic upgrade head (create the schema the integration tests insert into)
        run: uv run alembic upgrade head
        working-directory: apps/api
      - name: pytest (keyless deterministic lane)
        run: uv run python -m pytest -m "not live_llm and not e2e and not graph and not functional and not search"
        working-directory: apps/api

      # --- Frontend: type-check + lint ---
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: npm ci
        run: npm ci
        working-directory: apps/web
      - name: tsc --noEmit
        run: npx tsc --noEmit
        working-directory: apps/web
      - name: eslint
        run: npx eslint .
        working-directory: apps/web

  build-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        # api + web ONLY. The target test fixture is NEVER published (D-02 / T-11-09).
        include:
          - { name: api, context: apps/api }
          - { name: web, context: apps/web }
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        # The built-in GITHUB_TOKEN (least-privilege packages:write) — never a PAT, never echoed.
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/honraoclaude/${{ matrix.name }}
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
